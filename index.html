<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星语塔罗 · 每日占卜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="stars" id="stars"></div>

<nav>
  <div class="nav-logo">✦ 星语塔罗</div>
  <ul class="nav-links">
    <li><a href="#" data-page="home" onclick="showPage('home');return false;">首页</a></li>
    <li><a href="#" data-page="daily" onclick="showPage('daily');return false;">每日占卜</a></li>
    <li><a href="#" data-page="love" onclick="showPage('love');return false;">情感占卜</a></li>
    <li><a href="#" data-page="career" onclick="showPage('career');return false;">事业占卜</a></li>
    <li><a href="#" data-page="cosmic" onclick="showPage('cosmic');return false;">宇宙讯息</a></li>
  </ul>
</nav>

<main>
  <!-- 首页 -->
  <div id="home" class="active">
    <div class="hero">
      <h1 class="hero-title">星语塔罗</h1>
      <p class="hero-subtitle">以牌为镜 · 照见内心</p>
    </div>
    <div class="sections-grid">
      <div class="section-card" onclick="showPage('daily')">
        <span class="section-icon">🌙</span>
        <div class="section-title">每日占卜</div>
        <div class="section-desc">三张牌阵，洞察今日运势与内在指引</div>
      </div>
      <div class="section-card" onclick="showPage('love')">
        <span class="section-icon">💫</span>
        <div class="section-title">情感占卜</div>
        <div class="section-desc">关系牌阵，解读感情中的能量与走向</div>
      </div>
      <div class="section-card" onclick="showPage('career')">
        <span class="section-icon">⚡</span>
        <div class="section-title">事业占卜</div>
        <div class="section-desc">决策牌阵，指引职业方向与行动策略</div>
      </div>
      <div class="section-card" onclick="showPage('cosmic')">
        <span class="section-icon">✨</span>
        <div class="section-title">宇宙讯息</div>
        <div class="section-desc">一张牌，接收宇宙给你的今日灵感</div>
      </div>
    </div>
  </div>

  <!-- 每日占卜 -->
  <div id="daily" class="divination-page">
    <button class="back-btn" onclick="showPage('home')">← 返回</button>
    <div class="page-header">
      <h2 class="page-title">每日占卜</h2>
      <p class="page-subtitle">三牌阵 · 洞察今日</p>
    </div>
    <div class="question-input-wrap">
      <label>今日想探索的问题（可选）</label>
      <textarea class="question-input" rows="2" placeholder="例：今天我应该关注什么？"></textarea>
    </div>
    <div class="framework-selector">
      <button class="framework-btn active" onclick="setFramework(0)">过去·现在·未来</button>
      <button class="framework-btn" onclick="setFramework(1)">情况·行动·结果</button>
      <button class="framework-btn" onclick="setFramework(2)">身·心·灵</button>
    </div>
    <button class="start-btn" onclick="startDaily()">✦ 开始占卜</button>
    <div class="spread-area" id="daily-spread">
      <p class="spread-label">点击牌面翻开</p>
      <div class="cards-container" id="daily-cards"></div>
    </div>
    <div class="reading-area" id="daily-reading"></div>
  </div>

  <!-- 情感占卜 -->
  <div id="love" class="divination-page">
    <button class="back-btn" onclick="showPage('home')">← 返回</button>
    <div class="page-header">
      <h2 class="page-title">情感占卜</h2>
      <p class="page-subtitle">关系牌阵 · 解读感情能量</p>
    </div>
    <div class="question-input-wrap">
      <label>你的情感问题</label>
      <textarea class="question-input" rows="2" placeholder="例：我和TA的关系会有结果吗？"></textarea>
    </div>
    <div class="spread-selector">
      <button class="spread-btn active" onclick="setLoveSpread(0)">关系牌阵（5张）</button>
      <button class="spread-btn" onclick="setLoveSpread(1)">凯尔特十字（10张）</button>
    </div>
    <button class="start-btn" onclick="startLove()">✦ 开始占卜</button>
    <div class="spread-area" id="love-spread">
      <p class="spread-label">点击牌面翻开</p>
      <div class="cards-container" id="love-cards"></div>
    </div>
    <div class="reading-area" id="love-reading"></div>
  </div>

  <!-- 事业占卜 -->
  <div id="career" class="divination-page">
    <button class="back-btn" onclick="showPage('home')">← 返回</button>
    <div class="page-header">
      <h2 class="page-title">事业占卜</h2>
      <p class="page-subtitle">决策牌阵 · 指引职业方向</p>
    </div>
    <div class="question-input-wrap">
      <label>你的事业问题</label>
      <textarea class="question-input" rows="2" placeholder="例：我应该接受这份新工作吗？"></textarea>
    </div>
    <div class="spread-selector">
      <button class="spread-btn active" onclick="setCareerSpread(0)">决策牌阵（5张）</button>
      <button class="spread-btn" onclick="setCareerSpread(1)">马蹄形牌阵（7张）</button>
    </div>
    <button class="start-btn" onclick="startCareer()">✦ 开始占卜</button>
    <div class="spread-area" id="career-spread">
      <p class="spread-label">点击牌面翻开</p>
      <div class="cards-container" id="career-cards"></div>
    </div>
    <div class="reading-area" id="career-reading"></div>
  </div>

  <!-- 宇宙讯息 -->
  <div id="cosmic" class="divination-page">
    <button class="back-btn" onclick="showPage('home')">← 返回</button>
    <div class="page-header">
      <h2 class="page-title">宇宙讯息</h2>
      <p class="page-subtitle">一张牌 · 接收今日灵感</p>
    </div>
    <button class="start-btn" onclick="startCosmic()">✦ 接收讯息</button>
    <div class="spread-area" id="cosmic-spread">
      <p class="spread-label">点击牌面接收宇宙讯息</p>
      <div class="cards-container" id="cosmic-cards"></div>
    </div>
    <div class="reading-area" id="cosmic-reading"></div>
  </div>
</main>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
